name: linux release

on:
  push:
    tags:
      - "linux-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag, for example linux-v0.12.1"
        required: true
        type: string

concurrency:
  group: linux-release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  UPSTREAM_BASE_TAG: "v0.15.2"
  UPSTREAM_BASE_COMMIT: "95926fc88fd7c6e7f3e1acf229cb2dab637fdbe0"
  SWIFTLINT_VERSION: "0.65.0"
  SWIFTLINT_SHA256: "79306a34e5c7cc55a220cd108cbb861dcad5f10138dcdf261e2624ae8b0a486b"
  LINUX_SOURCEKIT_LIB_PATH: "/usr/lib/libsourcekitdInProc.so"
  ZIG_SHA256: "02aa270f183da276e5b5920b1dac44a63f1a49e55050ebde3aecc9eb82f93239"
  NFPM_VERSION: "2.47.0"
  NFPM_SHA256: "0660ca602b2d2d2ae4781a06c692b3eeb9d437ffea05b831d76e41f4a3188783"
  LINUXDEPLOY_SHA256: "e87ee0815d109282fdda73e34c2361d64d02b0ffaea3674b18f1fd1f6a687dcf"
  LINUXDEPLOY_GTK_COMMIT: "7a3fbc31a9e5075073ff8790f26effbac5f84453"
  LINUXDEPLOY_GTK_SHA256: "b0f4cbc684a0103a9651f0955b635eaea0096b3a66c0f5a2c2aa337960375171"
  APPIMAGE_RUNTIME_SHA256: "1cc49bcf1e2ccd593c379adb17c9f85a36d619088296504de95b1d06215aebbf"
  LDAI_RUNTIME_FILE: "/usr/local/share/appimage/runtime-x86_64"

jobs:
  release-linux:
    name: Build Linux x86_64 release
    runs-on: ubuntu-24.04
    container: swift:6.3.2-noble
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve and verify release tag
        id: release
        env:
          REQUESTED_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          TAG="$REQUESTED_TAG"
          if [[ ! "$TAG" =~ ^linux-v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?(\+linux\.[1-9][0-9]*)?$ ]]; then
            echo "invalid Linux release tag: $TAG" >&2
            exit 1
          fi

          git fetch --force origin \
            "+refs/heads/linux-port:refs/remotes/origin/linux-port" \
            "+refs/tags/$TAG:refs/tags/$TAG"
          COMMIT="$(git rev-parse "$TAG^{commit}")"
          if ! git merge-base --is-ancestor "$COMMIT" origin/linux-port; then
            echo "$TAG does not point to a commit on origin/linux-port" >&2
            exit 1
          fi
          git tag --force "$UPSTREAM_BASE_TAG" "$UPSTREAM_BASE_COMMIT"
          git merge-base --is-ancestor "$UPSTREAM_BASE_TAG" "$COMMIT"
          git checkout --detach "$COMMIT"

          VERSION="${TAG#linux-}"
          PACKAGE_VERSION="${VERSION#v}"
          {
            echo "tag=$TAG"
            echo "version=$VERSION"
            echo "package_version=$PACKAGE_VERSION"
            echo "commit=$COMMIT"
            echo "source_date_epoch=$(git show -s --format=%ct "$COMMIT")"
          } >> "$GITHUB_OUTPUT"

      - name: Install Linux build and test dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            libgtk-4-dev libadwaita-1-dev libepoxy-dev pkg-config \
            librsvg2-dev libgirepository1.0-dev gobject-introspection \
            git curl jq ca-certificates xz-utils unzip zsh file imagemagick ripgrep \
            rpm cpio desktop-file-utils patchelf ncurses-bin \
            at-spi2-core dbus-x11 gir1.2-atspi-2.0 openbox python3-gi xdotool xvfb xauth \
            libatk-bridge2.0-0 libgl1-mesa-dri libegl-mesa0 mesa-utils
          curl -fsSLo /tmp/swiftlint.zip \
            "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/swiftlint_linux_amd64.zip"
          echo "${SWIFTLINT_SHA256}  /tmp/swiftlint.zip" | sha256sum --check
          unzip -q /tmp/swiftlint.zip -d /usr/local/bin
          chmod +x /usr/local/bin/swiftlint
          swift --version
          swiftlint --version
          curl -fsSLo /tmp/zig.tar.xz \
            https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz
          echo "${ZIG_SHA256}  /tmp/zig.tar.xz" | sha256sum --check
          tar -xJf /tmp/zig.tar.xz -C /opt
          echo "/opt/zig-x86_64-linux-0.15.2" >> "$GITHUB_PATH"

      - name: Install Linux packaging tools
        run: |
          curl -fsSLo /tmp/nfpm.tar.gz \
            "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz"
          echo "${NFPM_SHA256}  /tmp/nfpm.tar.gz" | sha256sum --check
          tar -xzf /tmp/nfpm.tar.gz -C /usr/local/bin nfpm

          curl -fsSLo /usr/local/bin/linuxdeploy-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          echo "${LINUXDEPLOY_SHA256}  /usr/local/bin/linuxdeploy-x86_64.AppImage" | sha256sum --check
          chmod 0755 /usr/local/bin/linuxdeploy-x86_64.AppImage

          curl -fsSLo /usr/local/bin/linuxdeploy-plugin-gtk.sh \
            "https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/${LINUXDEPLOY_GTK_COMMIT}/linuxdeploy-plugin-gtk.sh"
          echo "${LINUXDEPLOY_GTK_SHA256}  /usr/local/bin/linuxdeploy-plugin-gtk.sh" | sha256sum --check
          chmod 0755 /usr/local/bin/linuxdeploy-plugin-gtk.sh

          mkdir -p "$(dirname "$LDAI_RUNTIME_FILE")"
          curl -fsSLo "$LDAI_RUNTIME_FILE" \
            https://github.com/AppImage/type2-runtime/releases/download/continuous/runtime-x86_64
          echo "${APPIMAGE_RUNTIME_SHA256}  ${LDAI_RUNTIME_FILE}" | sha256sum --check
          chmod 0755 "$LDAI_RUNTIME_FILE"

          nfpm --version
          linuxdeploy-x86_64.AppImage --appimage-extract-and-run --version

      - name: Test shared core
        working-directory: agtermCore
        run: swift test

      - name: Reject Linux CLI parser drift
        run: scripts/check-linux-cli-drift.sh

      - name: Enforce host-free core boundary
        run: scripts/check-linux-core-boundary.sh "$UPSTREAM_BASE_TAG"

      - name: Reject whitespace errors
        run: |
          git diff --check
          git diff --check "$UPSTREAM_BASE_TAG"...HEAD

      - name: Test published-release verifier
        run: scripts/test-published-linux-release.sh

      - name: Lint Swift sources
        run: swiftlint lint --strict --quiet

      - name: Cache vendored libghostty
        id: ghostty-cache
        uses: actions/cache@v6
        with:
          path: agterm-linux/vendor/ghostty
          key: libghostty-x86_64-${{ hashFiles('scripts/setup-linux.sh', 'scripts/verify-linux-resources.sh', 'linux/ghostty-resources.env', 'linux/patches/ghostty-embedded-opengl.patch', 'linux/patches/ghostty-embedded-input-handoff.patch', 'linux/patches/ghostty-lib-resources.patch') }}

      - name: Verify restored libghostty cache
        if: steps.ghostty-cache.outputs.cache-hit == 'true'
        run: |
          test -s agterm-linux/vendor/ghostty/lib/libghostty.so
          test -s agterm-linux/vendor/ghostty/include/ghostty.h
          scripts/verify-linux-resources.sh agterm-linux/vendor/ghostty/share

      - name: Test deterministic Ghostty resources
        run: scripts/test-linux-resources.sh

      - name: Build libghostty
        run: scripts/setup-linux.sh

      - name: Verify built libghostty resources
        run: scripts/verify-linux-resources.sh agterm-linux/vendor/ghostty/share

      - name: Test Linux package
        working-directory: agterm-linux
        run: swift test

      - name: Build Linux Debug products for GTK smoke
        working-directory: agterm-linux
        run: |
          swift build --product AgtermLinux
          swift build --product agtermctl-linux

      - name: GTK AT-SPI smoke tests
        env:
          AGTERM_UI_ARTIFACT_DIR: ${{ github.workspace }}/artifacts/linux-ui
        run: scripts/test-linux-ui.sh

      - name: Upload GTK diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: linux-release-ui-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/linux-ui
          if-no-files-found: warn

      - name: Build agterm-linux
        working-directory: agterm-linux
        run: swift build -c release

      - name: Package Linux release formats
        env:
          SOURCE_DATE_EPOCH: ${{ steps.release.outputs.source_date_epoch }}
        run: scripts/package-linux.sh "${{ steps.release.outputs.package_version }}" dist-linux

      - name: Verify Linux release formats
        run: scripts/verify-linux-packages.sh "${{ steps.release.outputs.package_version }}" dist-linux

      - name: Generate artifact attestations
        uses: actions/attest@v4
        with:
          subject-path: dist-linux/*

      - name: Write release notes
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          scripts/write-linux-release-notes.sh
          "${{ steps.release.outputs.tag }}"
          "${{ steps.release.outputs.commit }}"
          release-notes.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          target_commitish: ${{ steps.release.outputs.commit }}
          files: dist-linux/*
          fail_on_unmatched_files: true
          name: agterm-linux ${{ steps.release.outputs.version }}
          body_path: release-notes.md
          make_latest: true
