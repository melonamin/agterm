name: build

on:
  push:
    branches: [linux-port]
  pull_request:
    branches: [linux-port]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      swift: ${{ steps.filter.outputs.swift }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            swift:
              - "**/*.swift"
              - "agtermCore/**"
              - "agterm-linux/**"
              - "linux/**"
              - "packaging/linux/**"
              - "scripts/**"
              - ".swiftlint.yml"
              - ".github/workflows/ci.yml"
              - ".github/workflows/release-linux.yml"

  test-linux:
    name: Unit tests (Linux)
    needs: changes
    if: needs.changes.outputs.swift == 'true'
    runs-on: ubuntu-latest
    # Keep the shared, host-free controller package green on Linux because it backs the GTK frontend.
    container: swift:6.3.2
    steps:
      - uses: actions/checkout@v7
      - name: swift test
        working-directory: agtermCore
        run: swift test

  build-linux:
    name: Build app (Linux GTK)
    needs: [changes, test-linux]
    if: needs.changes.outputs.swift == 'true'
    runs-on: ubuntu-latest
    # Compile-check the GTK port. The official Swift image carries the toolchain; apt adds GTK4,
    # libadwaita, GL deps, and zig builds libghostty.
    container: swift:6.3.2
    steps:
      - uses: actions/checkout@v7
      - name: Install GTK4 + libadwaita + GL + zig
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            libgtk-4-dev libadwaita-1-dev libepoxy-dev pkg-config git curl ca-certificates xz-utils
          curl -fsSL https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz | tar -xJ -C /opt
          echo "/opt/zig-x86_64-linux-0.15.2" >> "$GITHUB_PATH"
      - name: Cache vendored libghostty (keyed on the pinned rev + the patch)
        uses: actions/cache@v6
        with:
          path: agterm-linux/vendor/ghostty
          key: libghostty-${{ hashFiles('scripts/setup-linux.sh', 'linux/patches/ghostty-embedded-opengl.patch') }}
      - name: Build libghostty (skips if the cache restored it)
        run: scripts/setup-linux.sh
      - name: swift build (agterm-linux)
        working-directory: agterm-linux
        run: swift build
