name: agterm-linux
arch: amd64
platform: linux
version: ${AGTERM_PACKAGE_VERSION}
version_schema: semver
release: 1
section: utils
priority: optional
maintainer: agterm-linux maintainers <melonamin@users.noreply.github.com>
description: Native terminal with a workspace and session sidebar, built on libghostty.
vendor: agterm-linux
homepage: https://github.com/melonamin/agterm-linux
license: MIT

contents:
  - src: ${AGTERM_PACKAGE_ROOT}/
    dst: /opt/agterm-linux
    type: tree
    expand: true
  - src: ${AGTERM_PACKAGE_ROOT}/share/applications/com.umputun.agterm.linux.desktop
    dst: /usr/share/applications/com.umputun.agterm.linux.desktop
    expand: true
  - src: ${AGTERM_PACKAGE_ROOT}/share/pixmaps/com.umputun.agterm.linux.png
    dst: /usr/share/pixmaps/com.umputun.agterm.linux.png
    expand: true
  - src: ${AGTERM_PACKAGE_ROOT}/share/icons/hicolor/
    dst: /usr/share/icons/hicolor
    type: tree
    expand: true
  - src: /opt/agterm-linux/bin/agterm-linux
    dst: /usr/bin/agterm-linux
    type: symlink
  - src: /opt/agterm-linux/bin/agtermctl
    dst: /usr/bin/agtermctl
    type: symlink

overrides:
  deb:
    depends:
      - bash
      - libc6 (>= 2.39)
      - libgtk-4-1 (>= 4.14)
      - libadwaita-1-0 (>= 1.5)
      - libepoxy0
  rpm:
    depends:
      - bash
      - glibc >= 2.39
      - gtk4 >= 4.14
      - libadwaita >= 1.5
      - libepoxy
